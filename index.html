<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sundarban · Island & Yearly Statistics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f1419;
font-family:Inter,Segoe UI,sans-serif;
padding:2rem;
color:#eef4ff;
}

.container{
max-width:1400px;
margin:auto;
}

.title{
font-size:1.8rem;
font-weight:700;

background:
linear-gradient(
135deg,
#c0f0db,
#79c9a4
);

-webkit-background-clip:text;

color:transparent;

border-left:
5px solid #2a9d6e;

padding-left:1rem;

margin-bottom:2rem;
}

.dropdown-row{

display:flex;

gap:2rem;

flex-wrap:wrap;

background:#11161e;

padding:1.4rem;

border-radius:24px;

border:
1px solid #2b5644;

margin-bottom:1.5rem;

}

.ctrl{
flex:1;
min-width:250px;
}

label{

display:block;

font-size:.78rem;

color:#8fc5ae;

font-weight:700;

margin-bottom:.5rem;

}

select{

width:100%;

padding:.9rem 1rem;

background:#05080d;

border:

1px solid #356a53;

color:white;

border-radius:16px;

font-size:.92rem;

}

.button-row{
margin-bottom:2rem;
}

.excel-btn{

background:
linear-gradient(
135deg,
#2a9d6e,
#5ebc91
);

border:none;

color:white;

padding:14px 28px;

font-size:1rem;

border-radius:22px;

cursor:pointer;

}

.panels{

display:flex;

gap:2rem;

flex-wrap:wrap;

}

.panel{

flex:1;

min-width:350px;

background:#11161e;

border-radius:24px;

overflow:hidden;

border:

1px solid #2d5b49;

}

.panel-header{

background:#08110f;

padding:1rem;

display:flex;

justify-content:space-between;

align-items:center;

font-weight:700;

}

.zoom-controls{

display:flex;

gap:8px;

}

.zoom-controls button{

background:#1f4535;

border:none;

color:white;

padding:8px 12px;

cursor:pointer;

border-radius:10px;

}

.zoom-controls button:hover{
background:#2a9d6e;
}

.image-area{

height:520px;

display:flex;

justify-content:center;

align-items:center;

background:#000;

padding:12px;

}

.zoom-container{

width:100%;

height:100%;

position:relative;

overflow:hidden;

cursor:grab;

}

.zoom-container img{

position:absolute;

left:50%;

top:50%;

max-width:100%;

max-height:100%;

object-fit:contain;

user-select:none;

transform:
translate(-50%,-50%);

}

@media(max-width:850px){

.panels{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
🌿 SUNDARBAN · ISLAND & YEARLY STATISTICS
</div>


<div class="dropdown-row">

<div class="ctrl">

<label>
🏝️ SELECT ISLAND
</label>

<select id="islandSelect">
</select>

</div>


<div class="ctrl">

<label>
📅 SELECT YEAR PERIOD
</label>

<select id="statsSelect">
</select>

</div>

</div>


<div class="button-row">

<a
href="CHANGE_RATE_DATA.xlsx"
target="_blank"
>

<button class="excel-btn">

📄 CHANGE_RATE_DATA

</button>

</a>

</div>



<div class="panels">


<div class="panel">

<div class="panel-header">

📸 ISLAND LAND PHOTO

<div class="zoom-controls">

<button onclick="zoom('islandContainer',0.2)">
+
</button>

<button onclick="zoom('islandContainer',-0.2)">
−
</button>

<button onclick="resetZoom('islandContainer')">
↺
</button>

</div>

</div>

<div class="image-area">

<div
class="zoom-container"
id="islandContainer"
>

<img id="islandImg">

</div>

</div>

</div>



<div class="panel">

<div class="panel-header">

📊 STATISTICS MAP

<div class="zoom-controls">

<button onclick="zoom('statsContainer',0.2)">
+
</button>

<button onclick="zoom('statsContainer',-0.2)">
−
</button>

<button onclick="resetZoom('statsContainer')">
↺
</button>

</div>

</div>

<div class="image-area">

<div
class="zoom-container"
id="statsContainer"
>

<img id="statsImg">

</div>

</div>

</div>


</div>

</div>



<script>

const islandFiles=[

"AJMALMARI.jpg",
"ARBESI.jpg",
"BAGMARA.jpg",
"BAKKHALI.jpg",
"BHAGABATPUR.jpg",
"CHAMTA.jpg",
"CHANDANPIRI.jpg",
"CHANDKHALI.jpg",
"CHOTOHARDI.jpg",
"CHULKATI.jpg",
"DHULIBHASANI.jpg",
"GONA.jpg",
"GOSABA.jpg",
"HARINBHANGA.jpg",
"HEROBHANGA.jpg",
"JHILLA.jpg",
"KHATUAJHURI.jpg",
"MATLA.jpg",
"MAYADWIP.jpg",
"NALGORA.jpg",
"NAMKHANA.jpg",
"NETIDHOPANI.jpg",
"PANCHAMUKHANI.jpg",
"PATIBONIA.jpg",
"PIRKHALI.jpg",
"SAPTAMUKHI.jpg",
"THAKURAN.jpg"

];


const yearFiles=[

"1991_2001.jpg",
"2001_2009.jpg",
"2009_2011.jpg",
"2011_2018.jpg",
"2018_2019.jpg",
"2019_2020.jpg",
"2020_2021.jpg",
"2021_2022.jpg"

];


function formatIslandName(f){

return f

.replace(".jpg","")

.toLowerCase()

.replace(
/\b\w/g,
x=>x.toUpperCase()
);

}


const islandSelect=
document.getElementById(
"islandSelect"
);

const statsSelect=
document.getElementById(
"statsSelect"
);


islandFiles.forEach(f=>{

let o=
document.createElement(
"option"
);

o.value=f;

o.textContent=
formatIslandName(f);

islandSelect.appendChild(o);

});


yearFiles.forEach(f=>{

let o=
document.createElement(
"option"
);

o.value=f;

o.textContent=
f
.replace(".jpg","")
.replace("_"," - ");

statsSelect.appendChild(o);

});


const islandImg=
document.getElementById(
"islandImg"
);

const statsImg=
document.getElementById(
"statsImg"
);



const state={};

[
"islandContainer",
"statsContainer"

]

.forEach(id=>{

state[id]={

scale:1,

x:0,

y:0

};

});


function render(id){

const img=

document
.getElementById(id)
.querySelector("img");

img.style.transform=

`
translate(
calc(-50% + ${state[id].x}px),

calc(-50% + ${state[id].y}px)

)

scale(${state[id].scale})

`;

}


function zoom(
id,
v
){

state[id].scale+=v;

if(
state[id].scale<1
)

state[id].scale=1;

render(id);

}


function resetZoom(
id
){

state[id]={

scale:1,

x:0,

y:0

};

render(id);

}


document
.querySelectorAll(
".zoom-container"
)

.forEach(box=>{

let drag=false;

let sx=0;

let sy=0;

box.addEventListener(

"mousedown",

e=>{

drag=true;

sx=
e.clientX
-
state[box.id].x;

sy=
e.clientY
-
state[box.id].y;

}

);

window.addEventListener(

"mouseup",

()=>drag=false

);

window.addEventListener(

"mousemove",

e=>{

if(!drag)
return;

state[box.id].x=
e.clientX-sx;

state[box.id].y=
e.clientY-sy;

render(
box.id
);

}

);

box.addEventListener(

"wheel",

e=>{

e.preventDefault();

zoom(

box.id,

e.deltaY<0
?

0.15

:

-0.15

);

}

);

});


function updateIsland(f){

islandImg.src=f;

resetZoom(
"islandContainer"
);

}


function updateStats(f){

statsImg.src=f;

resetZoom(
"statsContainer"
);

}


updateIsland(
islandFiles[0]
);

updateStats(
yearFiles[0]
);


islandSelect.addEventListener(

"change",

e=>

updateIsland(
e.target.value
)

);


statsSelect.addEventListener(

"change",

e=>

updateStats(
e.target.value
)

);

</script>

</body>
</html>
